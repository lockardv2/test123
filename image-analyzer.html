<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이미지 분석기 (Claude AI)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 28px;
      width: 100%;
      max-width: 720px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="password"],
    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #333;
      transition: border-color 0.2s;
      outline: none;
      background: #fafafa;
    }

    input[type="password"]:focus,
    input[type="text"]:focus,
    textarea:focus {
      border-color: #6c63ff;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .upload-area {
      border: 2px dashed #c5c5e8;
      border-radius: 12px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #f8f8ff;
      position: relative;
    }

    .upload-area:hover,
    .upload-area.drag-over {
      border-color: #6c63ff;
      background: #f0efff;
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .upload-area p {
      color: #888;
      font-size: 0.9rem;
    }

    .upload-area strong {
      color: #6c63ff;
    }

    #preview-container {
      display: none;
      margin-top: 16px;
      text-align: center;
    }

    #preview-img {
      max-width: 100%;
      max-height: 320px;
      border-radius: 10px;
      object-fit: contain;
      border: 1px solid #eee;
    }

    .file-info {
      margin-top: 8px;
      font-size: 0.82rem;
      color: #888;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #6c63ff;
      color: #fff;
      width: 100%;
      justify-content: center;
    }

    .btn-primary:hover:not(:disabled) {
      background: #5a52e0;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(108,99,255,0.35);
    }

    .btn-primary:disabled {
      background: #b8b4e8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: #f0efff;
      color: #6c63ff;
      font-size: 0.85rem;
      padding: 6px 14px;
    }

    .btn-secondary:hover {
      background: #e2e0ff;
    }

    #result-section {
      display: none;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    #result-text {
      white-space: pre-wrap;
      line-height: 1.75;
      color: #333;
      font-size: 0.95rem;
      min-height: 60px;
    }

    #result-text .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #6c63ff;
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-box {
      background: #fff0f0;
      border: 1.5px solid #fcc;
      border-radius: 8px;
      padding: 12px 16px;
      color: #c00;
      font-size: 0.9rem;
      margin-top: 12px;
      display: none;
    }

    .field-row {
      margin-bottom: 16px;
    }

    .field-row:last-child {
      margin-bottom: 0;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 20px 0;
    }

    .badge {
      display: inline-block;
      background: #f0efff;
      color: #6c63ff;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .copy-btn {
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.8rem;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover {
      border-color: #6c63ff;
      color: #6c63ff;
    }
  </style>
</head>
<body>

<h1>🔍 이미지 분석기</h1>
<p class="subtitle">Claude AI가 업로드한 이미지를 분석합니다</p>

<!-- API 키 카드 -->
<div class="card">
  <h2>🔑 API 설정</h2>
  <div class="field-row">
    <label for="api-key">Anthropic API Key</label>
    <input
      type="password"
      id="api-key"
      placeholder="sk-ant-..."
      autocomplete="off"
    />
  </div>
  <div class="field-row">
    <label for="model-select">모델</label>
    <select id="model-select" style="width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:0.95rem;color:#333;background:#fafafa;outline:none;">
      <option value="claude-opus-4-6">Claude Opus 4.6 (가장 강력)</option>
      <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (균형)</option>
      <option value="claude-haiku-4-5">Claude Haiku 4.5 (빠름)</option>
    </select>
  </div>
</div>

<!-- 이미지 업로드 카드 -->
<div class="card">
  <h2>🖼️ 이미지 업로드</h2>
  <div class="upload-area" id="upload-area">
    <input type="file" id="file-input" accept="image/*" />
    <div class="upload-icon">📁</div>
    <p><strong>클릭하거나 이미지를 드래그</strong>해서 업로드하세요</p>
    <p style="margin-top:6px;">PNG, JPG, GIF, WebP 지원</p>
  </div>

  <div id="preview-container">
    <img id="preview-img" alt="미리보기" />
    <div class="file-info" id="file-info"></div>
  </div>

  <hr class="divider" />

  <div class="field-row">
    <label for="prompt-input">분석 요청 (선택사항)</label>
    <textarea
      id="prompt-input"
      placeholder="예: 이 이미지에서 텍스트를 추출해줘&#10;예: 이미지 속 물체들을 나열해줘&#10;비워두면 전반적인 분석을 수행합니다"
    ></textarea>
  </div>

  <button class="btn btn-primary" id="analyze-btn" disabled onclick="analyzeImage()">
    분석 시작
  </button>
  <div class="error-box" id="error-box"></div>
</div>

<!-- 결과 카드 -->
<div class="card" id="result-section">
  <div class="result-header">
    <h2>📋 분석 결과 <span class="badge" id="model-badge"></span></h2>
    <button class="copy-btn" onclick="copyResult()">복사</button>
  </div>
  <div id="result-text"></div>
</div>

<script>
  const fileInput = document.getElementById('file-input');
  const uploadArea = document.getElementById('upload-area');
  const previewContainer = document.getElementById('preview-container');
  const previewImg = document.getElementById('preview-img');
  const fileInfo = document.getElementById('file-info');
  const analyzeBtn = document.getElementById('analyze-btn');
  const errorBox = document.getElementById('error-box');
  const resultSection = document.getElementById('result-section');
  const resultText = document.getElementById('result-text');
  const modelBadge = document.getElementById('model-badge');

  let selectedFile = null;
  let base64Data = null;
  let mediaType = null;

  // 드래그 앤 드롭
  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('drag-over');
  });
  uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('drag-over');
  });
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      handleFile(file);
    }
  });

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) handleFile(file);
  });

  function handleFile(file) {
    selectedFile = file;
    mediaType = file.type || 'image/jpeg';

    const reader = new FileReader();
    reader.onload = (e) => {
      const result = e.target.result;
      // base64 데이터만 추출 (data:image/...;base64, 제거)
      base64Data = result.split(',')[1];

      previewImg.src = result;
      previewContainer.style.display = 'block';
      fileInfo.textContent = `${file.name} · ${(file.size / 1024).toFixed(1)} KB`;
      analyzeBtn.disabled = false;
      clearError();
    };
    reader.readAsDataURL(file);
  }

  async function analyzeImage() {
    const apiKey = document.getElementById('api-key').value.trim();
    const model = document.getElementById('model-select').value;
    const userPrompt = document.getElementById('prompt-input').value.trim();

    clearError();

    if (!apiKey) {
      showError('API Key를 입력해주세요.');
      return;
    }
    if (!base64Data) {
      showError('이미지를 먼저 업로드해주세요.');
      return;
    }

    const prompt = userPrompt || '이 이미지를 자세히 분석해주세요. 이미지에 있는 모든 요소, 색상, 텍스트, 물체, 분위기 등을 설명해주세요.';

    analyzeBtn.disabled = true;
    analyzeBtn.innerHTML = '<span class="spinner"></span> 분석 중...';
    resultSection.style.display = 'none';
    resultText.innerHTML = '';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: model,
          max_tokens: 2048,
          stream: true,
          messages: [
            {
              role: 'user',
              content: [
                {
                  type: 'image',
                  source: {
                    type: 'base64',
                    media_type: mediaType,
                    data: base64Data,
                  },
                },
                {
                  type: 'text',
                  text: prompt,
                },
              ],
            },
          ],
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${response.status}`);
      }

      // 스트리밍 응답 처리
      modelBadge.textContent = model;
      resultSection.style.display = 'block';
      resultText.innerHTML = '<span class="cursor"></span>';

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]' || !data) continue;

          try {
            const parsed = JSON.parse(data);
            if (parsed.type === 'content_block_delta' && parsed.delta?.type === 'text_delta') {
              fullText += parsed.delta.text;
              resultText.innerHTML = escapeHtml(fullText) + '<span class="cursor"></span>';
              resultText.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
          } catch {
            // JSON 파싱 실패는 무시
          }
        }
      }

      resultText.innerHTML = escapeHtml(fullText);

    } catch (err) {
      showError('오류: ' + err.message);
      resultSection.style.display = 'none';
    } finally {
      analyzeBtn.disabled = false;
      analyzeBtn.innerHTML = '분석 시작';
    }
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br>');
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }

  function clearError() {
    errorBox.textContent = '';
    errorBox.style.display = 'none';
  }

  function copyResult() {
    const text = resultText.innerText || resultText.textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '복사됨 ✓';
      setTimeout(() => { btn.textContent = '복사'; }, 1500);
    });
  }
</script>

</body>
</html>
